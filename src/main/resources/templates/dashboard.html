<!DOCTYPE html>
<html>

<head>

    <title>Interview Management System</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#0f172a;
            color:white;
        }

        .navbar{
            background:#1e293b;
            padding:20px;
            font-size:30px;
            font-weight:bold;
        }

        .container{
            padding:40px;
        }

        .card{
            background:#1e293b;

            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

    </style>

</head>

<body>

<div class="navbar">
    🚀 Interview Management System
</div>

<div class="container">

    <div class="card">
        👨‍💼 Total Candidates : 20
    </div>

    <div class="card">
        📅 Interviews Scheduled : 10
    </div>

    <div class="card">
        🤖 AI Assistant Active
    </div>

</div>

<!-- NOVA AI CHATBOT -->

<iframe src="http://127.0.0.1:5000"></iframe>

</html>
